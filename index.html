.gap-en{font-size:10px;color:#aaa;margin-top:2px}
.gap-note{font-size:11px;color:#888;font-style:italic;margin-top:3px}

const TOTAL = APPS.reduce((s,a)=>s+a.items.length,0);
const STATUS = {
  ok:   {lbl:'적합',     c:'#2d6a2d', bg:'#e8f4e8'},
  part: {lbl:'부분적합', c:'#7a4e00', bg:'#fff3dc'},
  nok:  {lbl:'부적합',   c:'#a32d2d', bg:'#fceaea'},
  na:   {lbl:'해당없음', c:'#666',    bg:'#f2f2f2'},
  pend: {lbl:'미검토',   c:'#185FA5', bg:'#edf4ff'}
};

let curView='setup', curApp='B1', filter='all', expanded={};
let info   = ls('ed324ko_info',   {name:'',equip:'',al:'미결정',auditor:'',date:''});
let checks = ls('ed324ko_checks', {});

function ls(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function saveInfo(){lss('ed324ko_info',info);}
function saveChecks(){lss('ed324ko_checks',checks);}

function ck(a,no,f,def='pend'){return checks[a+'_'+no+'_'+f]||def;}
function setCk(a,no,f,v){checks[a+'_'+no+'_'+f]=v;saveChecks();renderAll();}

function stats(appId){
  const app=APPS.find(a=>a.id===appId);
  let ok=0,part=0,nok=0,na=0,pend=0;
  app.items.forEach(it=>{const s=ck(appId,it.no,'st');if(s==='ok')ok++;else if(s==='part')part++;else if(s==='nok')nok++;else if(s==='na')na++;else pend++;});
  const tot=app.items.length;
  return{tot,ok,part,nok,na,pend,comp:tot?Math.round((ok+na)/tot*100):0};
}
function allStats(){
  let tot=0,ok=0,part=0,nok=0,na=0,pend=0;
  APPS.forEach(a=>{const s=stats(a.id);tot+=s.tot;ok+=s.ok;part+=s.part;nok+=s.nok;na+=s.na;pend+=s.pend;});
  return{tot,ok,part,nok,na,pend,comp:tot?Math.round((ok+na)/tot*100):0};
}
function dotC(id){const s=stats(id);return s.nok>0?'#e24b4a':s.pend===s.tot?'#bbb':s.part>0?'#ef9f27':'#3a9a3a';}

function alHtml(al){return Object.entries(al).map(([k,v])=>`<span class="${v.startsWith('R')?'al-r':'al-n'}">${k}:${v}</span>`).join('');}

function setView(v){curView=v;document.querySelectorAll('.view-tab').forEach((b,i)=>{b.className='view-tab'+(['setup','checklist','gap'][i]===v?' active':'');});renderAll();}
function setApp(id){curApp=id;renderAll();}
function setFilter(f){filter=f;renderAll();}
function tog(id){expanded[id]=!expanded[id];renderAll();}

function renderStatBar(){
  const s=allStats();
  document.getElementById('stat-bar').innerHTML=[
    ['총 항목',s.tot,'#1a2b4a'],['적합',s.ok,'#2d6a2d'],['부분적합',s.part,'#7a4e00'],
    ['부적합',s.nok,'#a32d2d'],['해당없음',s.na,'#666'],['미검토',s.pend,'#185FA5']
  ].map(([l,n,c])=>`<div class="stat"><div class="stat-n" style="color:${c}">${n}</div><div class="stat-l">${l}</div></div>`).join('');
}

function renderChecklist(){
  const app=APPS.find(a=>a.id===curApp);
  const s=stats(curApp);
  const nav=APPS.map(a=>`<button onclick="setApp('${a.id}')" class="${a.id===curApp?'active':''}"><span class="dot" style="background:${dotC(a.id)}"></span>${a.id}<span class="cnt">${stats(a.id).tot}</span></button>`).join('');
  const fItems=app.items.filter(it=>filter==='all'||ck(app.id,it.no,'st')===filter);
  const fBtns=['all','ok','part','nok','na','pend'].map(f=>`<button class="fbt${filter===f?' active':''}" onclick="setFilter('${f}')">${f==='all'?'전체':STATUS[f].lbl}</button>`).join('');
  const rows=fItems.map(it=>{
    const st=ck(app.id,it.no,'st');
    const sv=STATUS[st]||STATUS.pend;
    const xk=app.id+'_'+it.no;
    const isOpen=!!expanded[xk];
    const note=checks[app.id+'_'+it.no+'_note']||'';
    const evid=checks[app.id+'_'+it.no+'_evid']||'';
    return`<div class="item">
<div class="item-row" onclick="tog('${xk}')">
  <span class="item-no">${it.no}</span>
  <span class="item-ko">${it.ko}<div class="item-en">${it.en}</div></span>
  <span class="item-al">${alHtml(it.al)}</span>
  <span class="item-ref">§${it.ref}</span>
  <select class="sel" style="color:${sv.c};background:${sv.bg}" onclick="event.stopPropagation()" onchange="setCk('${app.id}','${it.no}','st',this.value)">
  ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}"${st===k?' selected':''}>${v.lbl}</option>`).join('')}
  </select>
</div>
<div class="item-detail${isOpen?' open':''}">
  <div class="det-box"><b>기대 산출물:</b> ${it.out}</div>
  <span class="lbl">증거 문서 참조 (문서번호, 파일명)</span>
  <input type="text" placeholder="예) MLCR-v2.docx, TR-2024-001" value="${evid}" oninput="checks['${app.id}_${it.no}_evid']=this.value;saveChecks()">
  <span class="lbl">비고 / 심사 의견 / 조치 계획</span>
  <textarea placeholder="부적합 사항, 보완 필요 내용, 조치 일정 등..." oninput="checks['${app.id}_${it.no}_note']=this.value;saveChecks()">${note}</textarea>
</div>
</div>`;
  }).join('');
  return`<div class="layout">
<div class="sidebar">
<div class="cb" style="padding:8px"><div style="font-size:10px;font-weight:600;color:#888;margin-bottom:5px;padding:0 2px">APPENDIX</div>

</div>
<div class="main-col">
<div class="cb app-hdr">
<h3>${app.id} — ${app.title.split('—')[1].trim()}</h3>
<p>${app.desc} &nbsp;·&nbsp; ${s.tot}개 목표 &nbsp;·&nbsp; 적합률 ${s.comp}%</p>
<div class="prog-bar"><div class="prog-fill" style="width:${s.comp}%"></div></div>
</div>
<div class="filter-bar">${fBtns}<span style="font-size:11px;color:#aaa;margin-left:4px">${fItems.length}개 표시</span></div>
<div class="items-list">${rows||'<div class="empty">해당 필터의 항목이 없습니다</div>'}</div>

}

function renderGap(){
  const nok=[],part=[],pend=[];
  APPS.forEach(app=>{
    app.items.forEach(it=>{
      const st=ck(app.id,it.no,'st');
      const note=checks[app.id+'_'+it.no+'_note']||'';
      if(st==='nok')nok.push({app,it,note});
      else if(st==='part')part.push({app,it,note});
      else if(st==='pend')pend.push({app,it});
    });
  });
  const block=(list,cls,title)=>!list.length?'':
    `<div class="gap-sect"><h3>${title} (${list.length}건)</h3>${
      list.map(g=>`<div class="gap-item ${cls}">
<div class="gap-id">${g.app.id} · ${g.it.no} · §${g.it.ref}</div>
<div class="gap-ko">${g.it.ko}</div>
<div class="gap-en">${g.it.en}</div>
${g.note?`<div class="gap-note">${g.note}</div>`:''}
</div>`).join('')
    }</div>`;
  return`<div class="gap-panel">
${block(nok,'','부적합 (NOK)')}
${block(part,'part','부분적합 (PARTIAL)')}
${pend.length?`<div class="gap-sect"><h3>미검토 (${pend.length}건)</h3>${
pend.slice(0,40).map(g=>`<div class="gap-item pend">
<div class="gap-id">${g.app.id} · ${g.it.no} · §${g.it.ref}</div>
<div class="gap-ko">${g.it.ko}</div>
</div>`).join('')
}${pend.length>40?`<div style="padding:6px;font-size:11px;color:#bbb">... 외 ${pend.length-40}건</div>`:''}</div>`:''}
${!nok.length&&!part.length&&!pend.length?'<div class="empty">모든 항목이 적합 또는 해당없음 처리되었습니다.</div>':''}
</div>`;
}

function renderAll(){
  renderStatBar();
  const el=document.getElementById('main-area');
  if(curView==='setup')el.innerHTML=renderSetup();
  else if(curView==='checklist')el.innerHTML=renderChecklist();
  else el.innerHTML=renderGap();
}
renderAll();
</script>
</body>
</html>
